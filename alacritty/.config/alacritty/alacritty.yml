colors:
  primary:
    background: "0x191724"

window:
  padding:
    x: 0
    y: 0
  decorations: none

live_config_reload: true
scrolling:
    history: 10000
    multiplier: 10

font:
  normal:
    family: "IosevkaTerm Nerd Font"
    style: Regular
  bold:
    family: "IosevkaTerm Nerd Font"
    style: Bold
  italic:
    family: "IosevkaTerm Nerd Font"
    style: Italic
  size: 12

cursor:
  style: Block
  unfocused_hollow: true

key_bindings:
  - { key: V, mods: Control, action: Paste }



