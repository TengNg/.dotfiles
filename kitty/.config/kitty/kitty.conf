# Font configuration > kitty list-fonts
font_family M+1Code Nerd Font
bold_font M+1Code Nerd Font Bold
italic_font auto
bold_italic_font auto
# font_family IosevkaTerm NF
# bold_font IosevkaTerm NF Bold
# italic_font auto
# bold_italic_font auto

font_size 18
disable_ligatures always

text_composition_strategy legacy

sync_to_monitor no
enable_audio_bell no
cursor_shape block
shell_integration enabled no-cursor

hide_window_decorations yes

background #1F1F28
# background #1d2021
# background #181616
# background #232136
# background #191724

# Set the value of kitty_mod modifier for all mappings.
kitty_mod super

# Reload config
map kitty_mod+shift+r load_config_file

map ctrl+shift+q noop
map ctrl+shift+w noop
map ctrl+v paste_from_clipboard
map kitty_mod+c copy_to_clipboard

map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 18

map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5

